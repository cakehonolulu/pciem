          sudo rm /etc/apt/sources.list.d/plucky-universe.list

      - name: Build module and extract kernel artifacts
        run: |
          KDIR=$(ls -d /usr/src/linux-headers-*-generic | head -n1)
          make all -j $(nproc) KDIR=$KDIR KCFLAGS=-Werror

