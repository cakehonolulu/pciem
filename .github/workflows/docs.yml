name: Trigger site rebuild

on:
  push:
    branches: [main]

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Send repository_dispatch to site repo
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.SITE_DISPATCH_TOKEN }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: 'cakehonolulu',
              repo:  'cakehonolulu.github.io',
              event_type: 'pciem-updated',
              client_payload: {
                sha:  context.sha,
                ref:  context.ref,
              },
            });
            console.log('Dispatched pciem-updated to cakehonolulu.github.io');
